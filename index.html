<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование капсулы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #242333; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { margin-top: 20px; }
        .row { display: flex; justify-content: center; margin-bottom: 10px; }
        
        .seat { 
            background-color: #444451; 
            height: 50px; 
            width: 70px; 
            margin: 5px; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 12px;
            text-align: center;
        }
        .seat.selected { background-color: #6feaf6; color: black; font-weight: bold;}
        .seat.occupied { background-color: #fff; color: #000; pointer-events: none; }
        
        .btn { 
            margin-top: 20px; 
            padding: 15px 30px; 
            background-color: #6feaf6; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h2>Выберите капсулу</h2>
    
    <div class="container">
        <div class="row">
            <div class="seat">Капсула 1<br>(Низ)</div>
            <div class="seat occupied">Капсула 2<br>(Занято)</div>
        </div>
        <div class="row">
            <div class="seat">Капсула 3<br>(Низ)</div>
            <div class="seat">Капсула 4<br>(Верх)</div>
        </div>
    </div>
    
    <button class="btn" id="bookBtn">Забронировать</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        const seats = document.querySelectorAll('.row .seat:not(.occupied)');
        let selectedSeat = null;

        seats.forEach(seat => {
            seat.addEventListener('click', (e) => {
                seats.forEach(s => s.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedSeat = e.target.innerText;
            });
        });

        document.getElementById('bookBtn').addEventListener('click', () => {
            if(selectedSeat) {
                let user = tg.initDataUnsafe?.user;
                let guestName = user ? user.first_name : "Гость";
                let guestId = user ? user.id : 0;

                // Отправляем данные в n8n
                fetch("https://n8n.uhostkz.qzz.io/webhook-test/569f2c4f-ee3f-42f2-9873-d83cd983a334", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        capsule: selectedSeat,
                        name: guestName,
                        telegram_id: guestId
                    })
                }).then(response => {
                    tg.showAlert("Запрос отправлен! Закрываем карту.");
                    tg.close(); 
                });

            } else {
                tg.showAlert("Пожалуйста, выберите свободное место!");
            }
        });
    </script>
</body>
</html>
