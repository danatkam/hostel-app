<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование капсулы</title>
    <!-- Обязательный скрипт для связи с Telegram [1] -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { margin-top: 20px; padding: 15px 30px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Оформление заказа</h2>
        <p><b>Выбрана:</b> Капсула 1</p>
        <p><b>Тариф:</b> Стандарт (1 суток)</p>
        <p><b>К оплате:</b> 2000 ₸</p>
        
        <button id="mainButton" onclick="sendOrder()">Продолжить</button>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        function sendOrder() {
            // Меняем текст кнопки, чтобы видеть, что нажатие сработало
            document.getElementById("mainButton").innerText = "Отправка...";

            // Безопасное получение Telegram ID пользователя [2]
            const user = tg.initDataUnsafe?.user;
            const userId = user ? user.id : "unknown_user";

            // Всплывающее окно-маячок. Если оно не появилось, значит вы не в Телеграме!
            tg.showAlert("Пробуем отправить. Ваш ID: " + userId);

            // Пакет данных
            const orderData = {
                capsule: "Капсула 1",
                amount: 2000,
                tariff_name: "Стандарт (1 суток)",
                payment_method: "kaspi",
                user_id: userId
            };

            // Отправляем POST-запрос на БОЕВУЮ ссылку n8n
            fetch('https://n8n.uhostkz.qzz.io/webhook/229fee1f-edd2-412f-9da0-28219dffbf7e', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            })
            .then(response => {
                if (response.ok) {
                    tg.showAlert("✅ Данные успешно ушли в n8n!");
                    setTimeout(() => tg.close(), 2000); // Закрываем через 2 секунды
                } else {
                    tg.showAlert("❌ Ошибка сервера n8n: " + response.status);
                    document.getElementById("mainButton").innerText = "Продолжить";
                }
            })
            .catch(error => {
                tg.showAlert("❌ Ошибка сети: " + error.message);
                document.getElementById("mainButton").innerText = "Продолжить";
            });
        }
    </script>
</body>
</html>
