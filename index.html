<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование Капсулы</title>
    <!-- Подключаем скрипт Telegram Mini App [i] -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); }
        h2 { text-align: center; }
        /* Сетка капсул как в кинотеатре */
        .capsule-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .capsule { 
            padding: 15px 0; text-align: center; border-radius: 8px; border: 1px solid #ccc; 
            cursor: pointer; background-color: #e0ffe0; /* Зеленый - свободные */
            transition: 0.3s;
        }
        .capsule.occupied { background-color: #d3d3d3; cursor: not-allowed; color: #888; border-color: #aaa; } /* Серый - занятые */
        .capsule.selected { background-color: #007bff; color: #fff; border-color: #0056b3; } /* Синий - выбранный [i] */
        
        /* Пакеты и оплата */
        .section { margin-bottom: 20px; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; font-size: 16px; }
        .pay-btn { background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #fff); border: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Выберите капсулу</h2>
    
    <div class="capsule-grid" id="capsulesContainer">
        <!-- Капсулы сгенерируются скриптом ниже -->
    </div>

    <div class="section">
        <h3>Пакет проживания</h3>
        <select id="tariffSelect">
            <option value="5000">Сутки - 5 000 тг</option>
            <option value="30000">Неделя - 30 000 тг (Выгода 5 000 тг)</option>
            <option value="90000">Месяц - 90 000 тг (Выгода 40%)</option>
        </select>
    </div>

    <div class="section">
        <h3>Способ оплаты</h3>
        <select id="paymentMethod">
            <option value="kaspi">Kaspi / Единый QR</option>
            <option value="apple_google">Apple Pay / Google Pay</option>
            <option value="transfer">Перевод по реквизитам</option>
        </select>
    </div>

    <button class="pay-btn" id="payButton" onclick="sendDataToBot()">Перейти к оплате</button>

    <script>
        // Инициализация Telegram Web App [i]
        let tg = window.Telegram.WebApp;
        tg.expand(); // Открыть на весь экран [i]

        let selectedCapsule = null;

        // Генерация 46 капсул
        const container = document.getElementById('capsulesContainer');
        for (let i = 1; i <= 46; i++) {
            let div = document.createElement('div');
            div.className = 'capsule';
            div.innerText = i;
            
            // Для теста сделаем 1-ю капсулу занятой (чтобы вы видели, как это выглядит)
            if (i === 1) {
                div.classList.add('occupied');
            } else {
                div.onclick = function() {
                    // Убираем выделение со всех
                    document.querySelectorAll('.capsule').forEach(c => c.classList.remove('selected'));
                    // Выделяем нажатую
                    div.classList.add('selected');
                    selectedCapsule = i;
                };
            }
            container.appendChild(div);
        }

        // Отправка данных обратно в бота/n8n при нажатии "Оплатить"
        function sendDataToBot() {
            if (!selectedCapsule) {
                tg.showAlert("Пожалуйста, выберите свободную капсулу!");
                return;
            }
            
            let tariff = document.getElementById('tariffSelect').value;
            let payment = document.getElementById('paymentMethod').value;

            let orderData = {
                capsule: "Капсула " + selectedCapsule,
                amount: tariff,
                payment_method: payment,
                user_id: tg.initDataUnsafe?.user?.id || "test_user"
            };

            // Отправляем данные обратно в Telegram, чтобы n8n их поймал
            tg.sendData(JSON.stringify(orderData));
            tg.close(); // Закрываем Mini App
        }
    </script>
</body>
</html>
